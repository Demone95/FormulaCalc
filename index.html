<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="theme-color" content="#07101f"><title>FormulaPro v2.3</title><style>
*{box-sizing:border-box}body{margin:0;background:linear-gradient(160deg,#07101f,#111b30);color:white;font-family:Arial}.app{min-height:100vh;padding:calc(18px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom))}h1{margin:5px 0}small{color:#94a3b8}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:18px 0}.tab{padding:14px 5px;border-radius:14px;border:1px solid transparent;background:#101a2d;color:#718096;font-weight:bold;opacity:.65}.tab.on{opacity:1;color:white;background:#2874f0;border-color:#9ac7ff;box-shadow:0 0 25px #3b82f6,0 7px 18px #0008}.page{display:none}.page.on{display:block}.box,.card{background:#ffffff0d;border:1px solid #ffffff16;border-radius:18px;padding:15px;margin:10px 0}label{display:block;color:#cbd5e1;font-size:13px;margin:10px 0}input{width:100%;padding:15px;margin-top:6px;border-radius:12px;border:1px solid #ffffff20;background:#07101f;color:white;font-size:19px}.reset{width:100%;padding:13px;border:0;border-radius:12px;background:#ef444422;color:#fca5a5;font-weight:bold}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.card span{display:block;color:#94a3b8;font-size:12px}.card b{display:block;font-size:20px;margin-top:7px}.prog{height:29px;background:#ffffff15;border-radius:15px;overflow:hidden;position:relative}.prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,#2563eb,#38bdf8)}.prog b{position:absolute;inset:0;text-align:center;padding:6px}
</style><link rel="apple-touch-icon" href="icon-180.png"><link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"><link rel="manifest" href="manifest.json"></head><body><main class="app"><h1>🧪 FormulaPro</h1><small>Calcolatori di produzione · v2.3</small><div class="tabs"><button class="tab on" onclick="tab('f',this)">⏱️ Fine formulazione</button><button class="tab" onclick="tab('d',this)">📦 Dosaggio preservante</button></div>
<section id="d" class="page"><div class="box"><label>Kg formulati<input id="kf" type="number"></label><label>Kg ogni 1000<input id="km" type="number"></label><label>Kg aggiunti<input id="ka" type="number"></label><button class="reset" onclick="resetD()">↻ Reset</button></div><div class="grid"><div class="card"><span>Kg da aggiungere</span><b id="r1">—</b></div><div class="card"><span>Percentuale</span><b id="r2">—</b></div><div class="card"><span>Kg / 1000 reali</span><b id="r3">—</b></div></div></section>
<section id="f" class="page on"><div class="box"><label>Kg da formulare<input id="kt" type="number"></label><label>Portata (kg/h)<input id="po" type="number"></label><label>Kg formulati<input id="fa" type="number"></label><button class="reset" onclick="resetF()">↻ Reset</button></div><div class="prog"><i id="bar"></i><b id="bt">0%</b></div><div class="grid"><div class="card"><span>Kg rimanenti</span><b id="rr">—</b></div><div class="card"><span>Completato</span><b id="pc">—</b></div><div class="card"><span>Tempo rimanente</span><b id="tr">—</b></div><div class="card"><span>Fine prevista</span><b id="fp">—</b></div></div></section></main>
<script>
const $=x=>document.getElementById(x),v=x=>parseFloat($(x).value),fmt=(x,d=2)=>x.toLocaleString('it-IT',{minimumFractionDigits:d,maximumFractionDigits:d});
function tab(id,b){document.querySelectorAll('.page,.tab').forEach(x=>x.classList.remove('on'));$(id).classList.add('on');b.classList.add('on')}
function fineLavorativa(inizio,minuti){let d=new Date(inizio),resto=minuti;while(resto>0){let g=d.getDay(),h=d.getHours();if(g===0||(g===6&&h>=6)||(g===1&&h<6)){let giorni=g===6?2:g===0?1:0;d.setDate(d.getDate()+giorni);d.setHours(6,0,0,0);continue}let stop=new Date(d);if(g===5){stop.setDate(stop.getDate()+1);stop.setHours(6,0,0,0)}else if(g===6&&h<6){stop.setHours(6,0,0,0)}else{stop=new Date(d.getTime()+resto*60000)}let disp=Math.floor((stop-d)/60000);if(resto<=disp){d=new Date(d.getTime()+resto*60000);resto=0}else{d=stop;resto-=disp}}return d}
function calc(){let f=v('kf'),m=v('km'),a=v('ka');r1.textContent=f>0&&!isNaN(m)?fmt(f*m/1000)+' kg':'—';r2.textContent=f>0&&!isNaN(a)?fmt(a/f*100,3)+' %':'—';r3.textContent=f>0&&!isNaN(a)?fmt(a/f*1000)+' kg':'—';let t=v('kt'),p=v('po'),q=v('fa');if(t>0&&p>0){q=isNaN(q)?0:q;let r=Math.max(0,t-q),min=Math.round(r/p*60),per=Math.max(0,Math.min(100,q/t*100)),e=fineLavorativa(new Date(),min);rr.textContent=fmt(r)+' kg';pc.textContent=fmt(per,1)+' %';tr.textContent=Math.floor(min/60)+' h '+min%60+' min';fp.textContent=e.toLocaleDateString('it-IT')+' · '+e.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});bar.style.width=per+'%';bt.textContent=fmt(per,0)+'%'}}
document.querySelectorAll('input').forEach(x=>x.oninput=calc);function resetD(){['kf','km','ka'].forEach(x=>$(x).value='');calc()}function resetF(){['kt','po','fa'].forEach(x=>$(x).value='');rr.textContent='—';pc.textContent='—';tr.textContent='—';fp.textContent='—';bar.style.width='0%';bt.textContent='0%'}
</script></body></html>
