<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="theme-color" content="#07101f"><title>FormulaPro v2.4.2</title><style>
*{box-sizing:border-box}body{margin:0;background:linear-gradient(160deg,#07101f,#111b30);color:white;font-family:Arial}.app{min-height:100vh;padding:calc(18px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom))}h1{margin:5px 0}small{color:#94a3b8}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:18px 0}.tab{padding:14px 5px;border-radius:14px;border:1px solid transparent;background:#101a2d;color:#718096;font-weight:bold;opacity:.65}.tab.on{opacity:1;color:white;background:#2874f0;border-color:#9ac7ff;box-shadow:0 0 25px #3b82f6,0 7px 18px #0008}.page{display:none}.page.on{display:block}.box,.card{background:#ffffff0d;border:1px solid #ffffff16;border-radius:18px;padding:15px;margin:10px 0}label{display:block;color:#cbd5e1;font-size:13px;margin:10px 0}input{width:100%;padding:15px;margin-top:6px;border-radius:12px;border:1px solid #ffffff20;background:#07101f;color:white;font-size:19px}.reset{width:100%;padding:13px;border:0;border-radius:12px;background:#ef444422;color:#fca5a5;font-weight:bold}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.card span{display:block;color:#94a3b8;font-size:12px}.card b{display:block;font-size:20px;margin-top:7px}.prog{height:29px;background:#ffffff15;border-radius:15px;overflow:hidden;position:relative}.prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,#2563eb,#38bdf8)}.prog b{position:absolute;inset:0;text-align:center;padding:6px}
.topbar{display:flex;justify-content:space-between;align-items:center}.historyBtn,.saveBtn{border:1px solid #ffffff20;border-radius:12px;background:#ffffff0d;color:white;font-weight:bold;padding:11px 13px}.saveBtn{width:100%;margin-top:10px;background:#2563eb33}.overlay{display:none;position:fixed;inset:0;background:#0008;z-index:9}.overlay.on{display:block}.drawer{position:fixed;z-index:10;top:0;right:-92%;width:88%;max-width:390px;height:100%;overflow:auto;background:#0b1425;padding:calc(18px + env(safe-area-inset-top)) 14px 20px;transition:.25s;box-shadow:-10px 0 30px #0008}.drawer.on{right:0}.drawerHead{display:flex;align-items:center;justify-content:space-between}.drawerHead button,.deleteAll,.del{border:0;border-radius:10px;padding:9px;background:#ef444422;color:#fca5a5}.histItem{background:#ffffff0d;border:1px solid #ffffff16;border-radius:15px;padding:13px;margin:10px 0}.histItem small{display:block;margin-bottom:7px}.histItem p{margin:4px 0;font-size:13px;color:#cbd5e1}.del{float:right}</style><link rel="apple-touch-icon" href="icon-180.png"><link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"><link rel="manifest" href="manifest.json"></head><body><main class="app"><div class="topbar"><div><h1>🧪 FormulaPro</h1><small>Calcolatori di produzione · v2.4.2</small></div><button class="historyBtn" onclick="openHistory()">☰ Cronologia</button></div><div class="tabs"><button class="tab on" onclick="tab('f',this)">⏱️ Fine formulazione</button><button class="tab" onclick="tab('d',this)">📦 Dosaggio preservante</button></div>
<section id="d" class="page"><div class="box"><label>Kg formulati<input id="kf" type="number"></label><label>Kg ogni 1000<input id="km" type="number"></label><label>Kg aggiunti<input id="ka" type="number"></label><button class="reset" onclick="resetD()">↻ Reset</button><button class="saveBtn" onclick="saveD()">Salva calcolo</button></div><div class="grid"><div class="card"><span>Kg da aggiungere</span><b id="r1">—</b></div><div class="card"><span>Percentuale</span><b id="r2">—</b></div><div class="card"><span>Kg / 1000 reali</span><b id="r3">—</b></div></div></section>
<section id="f" class="page on"><div class="box"><label>Kg da formulare<input id="kt" type="number"></label><label>Portata (kg/h)<input id="po" type="number"></label><label>Kg formulati<input id="fa" type="number"></label><label>Ora di partenza<input id="ora" type="time"></label><button class="reset" onclick="resetF()">↻ Reset</button><button class="saveBtn" onclick="saveF()">Salva calcolo</button></div><div class="prog"><i id="bar"></i><b id="bt">0%</b></div><div class="grid"><div class="card"><span>Kg rimanenti</span><b id="rr">—</b></div><div class="card"><span>Completato</span><b id="pc">—</b></div><div class="card"><span>Tempo rimanente</span><b id="tr">—</b></div><div class="card"><span>Fine prevista</span><b id="fp">—</b></div></div></section></main><div id="ov" class="overlay" onclick="closeHistory()"></div><aside id="drawer" class="drawer"><div class="drawerHead"><h2>Cronologia</h2><button onclick="closeHistory()">✕</button></div><div id="history"></div><button class="deleteAll" onclick="clearHistory()">Cancella tutta la cronologia</button></aside>
<script>
const $=x=>document.getElementById(x),v=x=>parseFloat($(x).value),fmt=(x,d=2)=>x.toLocaleString('it-IT',{minimumFractionDigits:d,maximumFractionDigits:d});
function tab(id,b){document.querySelectorAll('.page,.tab').forEach(x=>x.classList.remove('on'));$(id).classList.add('on');b.classList.add('on')}
function fineLavorativa(inizio,minuti){let d=new Date(inizio),resto=minuti;while(resto>0){let g=d.getDay(),h=d.getHours();if(g===0||(g===6&&h>=6)||(g===1&&h<6)){let giorni=g===6?2:g===0?1:0;d.setDate(d.getDate()+giorni);d.setHours(6,0,0,0);continue}let stop=new Date(d);if(g===5){stop.setDate(stop.getDate()+1);stop.setHours(6,0,0,0)}else if(g===6&&h<6){stop.setHours(6,0,0,0)}else{stop=new Date(d.getTime()+resto*60000)}let disp=Math.floor((stop-d)/60000);if(resto<=disp){d=new Date(d.getTime()+resto*60000);resto=0}else{d=stop;resto-=disp}}return d}
function calc(){let f=v('kf'),m=v('km'),a=v('ka');r1.textContent=f>0&&!isNaN(m)?fmt(f*m/1000)+' kg':'—';r2.textContent=f>0&&!isNaN(a)?fmt(a/f*100,3)+' %':'—';r3.textContent=f>0&&!isNaN(a)?fmt(a/f*1000)+' kg':'—';let t=v('kt'),p=v('po'),q=v('fa');if(t>0&&p>0){q=isNaN(q)?0:q;let r=Math.max(0,t-q),min=Math.round(r/p*60),per=Math.max(0,Math.min(100,q/t*100)),e=fineLavorativa(startDate(),min);rr.textContent=fmt(r)+' kg';pc.textContent=fmt(per,1)+' %';tr.textContent=Math.floor(min/60)+' h '+min%60+' min';fp.textContent=e.toLocaleDateString('it-IT')+' · '+e.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});bar.style.width=per+'%';bt.textContent=fmt(per,0)+'%'}}
document.querySelectorAll('input').forEach(x=>x.oninput=calc);$('ora').addEventListener('change',function(){if(!this.value){setNow();calc()}});function resetD(){['kf','km','ka'].forEach(x=>$(x).value='');calc()}function resetF(){['kt','po','fa'].forEach(x=>$(x).value='');rr.textContent='—';pc.textContent='—';tr.textContent='—';fp.textContent='—';bar.style.width='0%';bt.textContent='0%'}

function setNow(){let d=new Date();ora.value=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function startDate(){let d=new Date(),x=ora.value;if(x){let z=x.split(':');d.setHours(+z[0],+z[1],0,0)}return d}
function openHistory(){$('drawer').classList.add('on');$('ov').classList.add('on');renderHistory()} function closeHistory(){$('drawer').classList.remove('on');$('ov').classList.remove('on')}
function getHistory(){return JSON.parse(localStorage.getItem('formulaProHistory')||'[]')} function putHistory(h){localStorage.setItem('formulaProHistory',JSON.stringify(h));renderHistory()}
function addHistory(x){let h=getHistory();h.unshift(x);putHistory(h);openHistory()}
function saveF(){if(!(v('kt')>0&&v('po')>0))return alert('Inserisci i dati del calcolo');addHistory({type:'Fine formulazione',date:new Date().toLocaleString('it-IT'),rows:['Kg da formulare: '+fmt(v('kt')),'Portata: '+fmt(v('po'))+' kg/h','Kg formulati: '+fmt(isNaN(v('fa'))?0:v('fa')),'Ora di partenza: '+ora.value,'Fine prevista: '+fp.textContent]})}
function saveD(){if(!(v('kf')>0&&v('km')>=0))return alert('Inserisci i dati del calcolo');addHistory({type:'Dosaggio preservante',date:new Date().toLocaleString('it-IT'),rows:['Kg formulati: '+fmt(v('kf')),'Dosaggio: '+fmt(v('km'))+' kg/1000','Kg da aggiungere: '+r1.textContent,'Kg aggiunti: '+(isNaN(v('ka'))?'—':fmt(v('ka'))+' kg')]})}
function renderHistory(){let h=getHistory();$('history').innerHTML=h.length?h.map((x,i)=>'<div class="histItem"><button class="del" onclick="delHistory('+i+')">Elimina</button><small>'+x.date+'</small><b>'+x.type+'</b>'+x.rows.map(r=>'<p>'+r+'</p>').join('')+'</div>').join(''):'<p style="color:#94a3b8">Nessun calcolo salvato.</p>'}
function delHistory(i){let h=getHistory();h.splice(i,1);putHistory(h)} function clearHistory(){if(confirm('Cancellare tutta la cronologia?'))putHistory([])}
setNow();calc();
</script></body></html>
